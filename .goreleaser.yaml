# GoReleaser config — run: goreleaser release (requires GITHUB_TOKEN and a clean tag).
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gtr
    main: ./cmd/gtr
    binary: gtr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - id: gtr
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore"
      - "^style:"
      - "^test:"

brews:
  - repository:
      owner: hobbymarks
      name: release
    homepage: "https://github.com/hobbymarks/gtr"
    description: "Multi-engine translation CLI inspired by translate-shell"
    license: "MIT"
    directory: Formula
    install: |
      bin.install "gtr"
