name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go mod tidy
        run: go mod tidy

      - name: Go mod verify
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test (race on Linux)
        if: runner.os == 'Linux'
        run: go test -race ./...

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: go test ./...

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: go build -o gtr ./cmd/gtr

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: go build -o gtr.exe ./cmd/gtr

      - name: Smoke CLI (Unix)
        if: runner.os != 'Windows'
        run: ./gtr -V && ./gtr --help >/dev/null

      - name: Smoke CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./gtr.exe -V; ./gtr.exe --help | Out-Null
